services:
  postgres:
    image: postgres:16.6-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: kronos
      POSTGRES_USER: kronos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kronos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kronos -d kronos"]
      interval: 10s
      timeout: 5s
      retries: 10

  inference:
    build:
      context: .
      target: inference
    restart: unless-stopped
    environment:
      TORCH_NUM_THREADS: ${TORCH_NUM_THREADS:-1}
      MAX_INFERENCE_P95_MS: ${MAX_INFERENCE_P95_MS:-10000}
      MIN_AVAILABLE_MEMORY_MB: ${MIN_AVAILABLE_MEMORY_MB:-512}
      INFERENCE_BENCHMARK_RUNS: ${INFERENCE_BENCHMARK_RUNS:-3}
      HF_HOME: /models/huggingface
    volumes:
      - model_cache:/models

  trader:
    build:
      context: .
      target: trader
    restart: unless-stopped
    environment:
      TRADING_MODE: ${TRADING_MODE:-paper}
      DATABASE_URL: postgresql://kronos:${POSTGRES_PASSWORD:-kronos}@postgres:5432/kronos
      INFERENCE_URL: http://inference:8081
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
      LIVE_RISK_ACKNOWLEDGEMENT: ${LIVE_RISK_ACKNOWLEDGEMENT:-}
      REQUIRED_LIVE_RISK_ACKNOWLEDGEMENT: ${REQUIRED_LIVE_RISK_ACKNOWLEDGEMENT:-I_ACCEPT_EXTREME_FUTURES_RISK}
      ALLOW_UNVALIDATED_PAIRS: ${ALLOW_UNVALIDATED_PAIRS:-false}
      ALLOW_RESEARCH_FULL_MARGIN_LIVE: ${ALLOW_RESEARCH_FULL_MARGIN_LIVE:-false}
      PAPER_STARTING_EQUITY: ${PAPER_STARTING_EQUITY:-20}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      inference:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    stop_grace_period: 30s

volumes:
  postgres_data:
  model_cache:
