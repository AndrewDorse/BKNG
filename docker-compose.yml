services:
  trader:
    build:
      context: .
      target: trader
    restart: unless-stopped
    environment:
      TRADING_MODE: ${TRADING_MODE:-live}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
      LIVE_RISK_ACKNOWLEDGEMENT: ${LIVE_RISK_ACKNOWLEDGEMENT:-I_ACCEPT_EXTREME_FUTURES_RISK}
      TRADER_STATE_PATH: /state/portfolio_state.json
      POLL_SECONDS: ${POLL_SECONDS:-30}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - trader_state:/state
    stop_grace_period: 30s

volumes:
  trader_state:
