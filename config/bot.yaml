mode: live
poll_seconds: 30
state_path: /state/portfolio_state.json

health:
  host: 0.0.0.0
  port: 8080

bindings:
  - name: btc_ema_live
    strategy: kronos_futures.bot.strategies:CompositeCandleStrategy
    symbol: BTCUSDT
    interval: 1h
    validated: true
    parameters:
      name: ema_momentum_live
      rules:
        - name: btc_ema_20_80_3h_long
          family: ema_momentum
          interval: 1h
          side: LONG
          target_pct: 0.05
          stop_pct: 0.01
          hold_candles: 3
          parameters:
            fast: 20
            slow: 80
            cadence_hours: 3
            bootstrap_once: true
        - name: btc_ema_20_80_3h_short
          family: ema_momentum
          interval: 1h
          side: SHORT
          target_pct: 0.05
          stop_pct: 0.01
          hold_candles: 3
          parameters:
            fast: 20
            slow: 80
            cadence_hours: 3
            bootstrap_once: true
    risk:
      leverage: 20
      margin_fraction: 0.10
      stop_pct: 0.01
      target_pct: 0.05
      max_drawdown_pct: 0.25

