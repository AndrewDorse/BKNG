mode: live
poll_seconds: 30
state_path: /state/portfolio_state.json

health:
  host: 0.0.0.0
  port: 8080

bindings:
  - name: tsla_portfolio_live
    strategy: kronos_futures.bot.strategies:CompositeCandleStrategy
    symbol: TSLA
    interval: 1h
    validated: true
    parameters:
      name: pair_portfolio_live
      rules:
        - name: tsla_ema_20_80_72h_long
          family: ema_momentum
          interval: 1h
          side: LONG
          target_pct: 0.02
          stop_pct: 0.01
          hold_candles: 72
          parameters: {fast: 20, slow: 80, cadence_hours: 72, bootstrap_once: true, priority: 1, strategy_id: tsla_ema, enabled: true}
        - name: tsla_ema_20_80_72h_short
          family: ema_momentum
          interval: 1h
          side: SHORT
          target_pct: 0.02
          stop_pct: 0.01
          hold_candles: 72
          parameters: {fast: 20, slow: 80, cadence_hours: 72, bootstrap_once: true, priority: 1, strategy_id: tsla_ema, enabled: true}
        - name: tsla_vol_24_20_4h_long
          family: breakout_expansion
          interval: 1h
          side: LONG
          target_pct: 0.02
          stop_pct: 0.01
          hold_candles: 4
          parameters: {lookback: 24, breakout: 20, priority: 2, strategy_id: tsla_vol, enabled: true}
        - name: tsla_vol_24_20_4h_short
          family: breakout_expansion
          interval: 1h
          side: SHORT
          target_pct: 0.02
          stop_pct: 0.01
          hold_candles: 4
          parameters: {lookback: 24, breakout: 20, priority: 2, strategy_id: tsla_vol, enabled: true}
        - name: tsla_orb_4_12h_long
          family: orb
          interval: 1h
          side: LONG
          target_pct: 0.015
          stop_pct: 0.01
          hold_candles: 12
          parameters: {breakout: 4, priority: 3, strategy_id: tsla_orb, enabled: false}
        - name: tsla_orb_4_12h_short
          family: orb
          interval: 1h
          side: SHORT
          target_pct: 0.015
          stop_pct: 0.01
          hold_candles: 12
          parameters: {breakout: 4, priority: 3, strategy_id: tsla_orb, enabled: false}
    risk:
      leverage: 20
      margin_fraction: 0.05
      stop_pct: 0.01
      target_pct: 0.02
      max_drawdown_pct: 0.25

